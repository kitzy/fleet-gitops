# Fleets are available in Fleet Premium.

# This file updates policies, reports, agent options, controls, and software for hosts assigned to the "Servers" fleet.

# To add another fleet, create a new file in the fleets/ directory and copy and paste the contents from this file.
# Update the secret in the new file, then create the corresponding secret in GitHub Actions secrets.
# Then add that secret to .github/workflows/workflow.yml as an env variable.
# The secret name in the YAML file must match the secret name in GitHub Actions secrets.

name: Servers
policies:
  - path: ../lib/linux/policies/baseline-user-ssh.policies.yml
    labels_include_any:
      - Ubuntu Linux hosts
reports:
  - path: ../lib/all/queries/collect-usb-devices.queries.yml
  - path: ../lib/all/queries/collect-fleetd-update-channels.queries.yml
  - path: ../lib/all/queries/collect-failed-login-attempts.queries.yml
agent_options:
  path: ../lib/agent-options.yml
controls:
  scripts:
  - path: ../lib/linux/scripts/baseline-user-ssh.sh
  apple_settings:
    configuration_profiles:
    - path: ../lib/macos/configuration-profiles/fleetd-full-disk-access.mobileconfig
      labels_include_any:
      - macOS hosts
settings:
  secrets:
    - secret: "$FLEET_SERVERS_ENROLL_SECRET"
  features:
    enable_host_users: true
    enable_software_inventory: true
software:
