name: Workstations
policies:
- path: ../platforms/macos/policies/macos-device-health.policies.yml
- path: ../platforms/windows/policies/windows-device-health.policies.yml
- path: ../platforms/macos/policies/macos-fma-patch.policies.yml
reports:
- path: ../platforms/all/reports/collect-usb-devices.reports.yml
- path: ../platforms/all/reports/collect-fleetd-update-channels.reports.yml
- path: ../platforms/all/reports/collect-failed-login-attempts.reports.yml
- path: ../platforms/all/reports/get-authorized-ssh-keys.reports.yml
- path: ../platforms/all/reports/get-unencrypted-ssh-keys.reports.yml
- path: ../platforms/all/reports/get-installed-chrome-extensions.reports.yml
- path: ../platforms/all/reports/get-installed-vscode-extensions.reports.yml
- path: ../platforms/all/reports/get-all-listening-ports-by-process.reports.yml
- path: ../platforms/all/reports/get-mcp-client-configurations.reports.yml
- path: ../platforms/macos/reports/get-laptops-with-failing-batteries.reports.yml
- path: ../platforms/macos/reports/get-local-administrator-accounts.reports.yml
- path: ../platforms/macos/reports/get-builtin-antivirus-status.reports.yml
- path: ../platforms/macos/reports/get-installed-safari-extensions.reports.yml
- path: ../platforms/windows/reports/get-antivirus-status.reports.yml
- path: ../platforms/windows/reports/get-teamviewer-status.reports.yml
agent_options:
  path: ../platforms/agent-options.yml
controls:
  enable_disk_encryption: true
  enable_recovery_lock_password: true
  macos_updates:
    deadline: '2026-05-20'
    minimum_version: '26.5'
  apple_settings:
    configuration_profiles:
    - path: ../platforms/macos/declaration-profiles/passcode-settings-ddm.json
      labels_include_any:
      - macOS hosts
    - path: ../platforms/macos/declaration-profiles/softwareupdate-settings-ddm.json
      labels_include_any:
      - macOS hosts
    - path: ../platforms/macos/configuration-profiles/macos-firewall.mobileconfig
      labels_include_any:
      - macOS hosts
    - path: ../platforms/macos/configuration-profiles/disable-guest.mobileconfig
      labels_include_any:
      - macOS hosts
    - path: ../platforms/macos/configuration-profiles/chrome-disable-password-manager.mobileconfig
      labels_include_any:
      - macOS hosts
    - path: ../platforms/macos/configuration-profiles/fleet-background-activity.mobileconfig
      labels_include_any:
      - macOS hosts
    - path: ../platforms/macos/configuration-profiles/fleetd-full-disk-access.mobileconfig
      labels_include_any:
      - macOS hosts
    - path: ../platforms/macos/configuration-profiles/disable-content-caching.mobileconfig
      labels_include_any:
      - macOS hosts
  scripts: null
settings:
  secrets:
  - secret: $FLEET_WORKSTATIONS_ENROLL_SECRET
  features:
    enable_host_users: true
    enable_software_inventory: true
software:
  packages:
  - path: ../platforms/macos/scripts/enable-touch-id-sudo.sh
    display_name: Enable Touch ID for sudo
    self_service: true
    categories:
    - Developer tools
