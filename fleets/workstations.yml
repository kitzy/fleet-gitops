name: Workstations
policies:
- path: ../lib/macos/policies/macos-device-health.policies.yml
- path: ../lib/windows/policies/windows-device-health.policies.yml
- path: ../lib/macos/policies/macos-fma-patch.policies.yml
reports:
- path: ../lib/all/queries/collect-usb-devices.queries.yml
- path: ../lib/all/queries/collect-fleetd-update-channels.queries.yml
- path: ../lib/all/queries/collect-failed-login-attempts.queries.yml
agent_options:
  path: ../lib/agent-options.yml
controls:
  enable_disk_encryption: true
  macos_updates:
    deadline: '2026-05-04'
    minimum_version: '26.4.1'
  apple_settings:
    configuration_profiles:
    - path: ../lib/macos/configuration-profiles/macos-password.mobileconfig
      labels_include_any:
      - macOS hosts
    - path: ../lib/macos/configuration-profiles/macos-firewall.mobileconfig
      labels_include_any:
      - macOS hosts
    - path: ../lib/macos/configuration-profiles/disable-guest.mobileconfig
      labels_include_any:
      - macOS hosts
    - path: ../lib/macos/configuration-profiles/macos-autoUpdates.mobileconfig
      labels_include_any:
      - macOS hosts
    - path: ../lib/macos/configuration-profiles/chrome-disable-password-manager.mobileconfig
      labels_include_any:
      - macOS hosts
    - path: ../lib/macos/configuration-profiles/fleet-background-activity.mobileconfig
      labels_include_any:
      - macOS hosts
    - path: ../lib/macos/configuration-profiles/fleetd-full-disk-access.mobileconfig
      labels_include_any:
      - macOS hosts
    - path: ../lib/macos/configuration-profiles/disable-content-caching.mobileconfig
      labels_include_any:
      - macOS hosts
  scripts: null
settings:
  secrets:
  - secret: $FLEET_WORKSTATIONS_ENROLL_SECRET
  features:
    enable_host_users: true
    enable_software_inventory: true
software:
  fleet_maintained_apps:
  - slug: 1password/darwin
    display_name: 1Password
    setup_experience: false
    self_service: true
