- name: macOS - Enable FileVault
  platform: darwin
  description: This policy checks if FileVault (disk encryption) is enabled.
  resolution: As an IT admin, turn on disk encryption in Fleet.
  query: SELECT 1 FROM filevault_status WHERE status = 'FileVault is On.';

- name: macOS - Enable Firewall
  platform: darwin
  description: This policy checks if Firewall is enabled.
  resolution: An an IT admin, deploy a macOS, Firewall profile with the EnableFirewall option set to true.
  query: SELECT 1 FROM managed_policies WHERE domain='com.apple.security.firewall' AND username = '' AND name='EnableFirewall' AND CAST(value AS INT) = 1;

- name: macOS - System Integrity Protection (SIP)
  platform: darwin
  description: This policy checks if System Integrity Protection (SIP) is enabled.
  resolution: |
    Reboot the Mac into Recovery (hold ⌘ + R during startup).
    Open Terminal from the Utilities menu.
    Run `csrutil enable`
    Reboot normally.
  query: SELECT 1 FROM sip_config WHERE config_flag = 'sip' AND enabled = 1;

- name: macOS - Require 8 character password
  platform: darwin
  description: This policy checks if the end user is required to enter a password, with at least 8 characters, to unlock the host.
  resolution: As an IT admin, deploy or update the DDM passcode declaration (platforms/macos/declaration-profiles/passcode-settings-ddm.json) with MinimumLength set to at least 8.
  query: |
    SELECT 1 FROM password_policy
    WHERE policy_category LIKE '%PasswordContent'
      AND policy_content LIKE '%.{8,}%';

- name: macOS - Disable Guest user
  platform: darwin
  description: |
    Verifies guest access is effectively disabled. Two layers must hold: (1) the Disable Guest User configuration profile is delivered and projecting com.apple.MCX (DisableGuestAccount=true, EnableGuestAccount=false) plus a com.apple.loginwindow Forced GuestEnabled=false, and (2) the on-disk /Library/Preferences/com.apple.loginwindow.plist does not have GuestEnabled set to true. On macOS 26 the Users & Groups UI writes the unmanaged GuestEnabled key and macOS honors that user-level value despite the managed pref, so the live plist must also be checked. The disable-guest-enforce.sh remediation installs a LaunchDaemon that reverts the unmanaged value whenever it changes.
  resolution: As an IT admin, deploy the Disable Guest User profile (platforms/macos/configuration-profiles/disable-guest.mobileconfig). Fleet will auto-run platforms/macos/scripts/disable-guest-enforce.sh on failure to install/refresh the enforcement LaunchDaemon.
  run_script:
    path: ../scripts/disable-guest-enforce.sh
  query: |
    SELECT 1
    WHERE EXISTS (
      SELECT 1 FROM managed_policies
      WHERE domain = 'com.apple.MCX' AND username = ''
        AND name = 'DisableGuestAccount' AND CAST(value AS INT) = 1
    )
    AND EXISTS (
      SELECT 1 FROM managed_policies
      WHERE domain = 'com.apple.MCX' AND username = ''
        AND name = 'EnableGuestAccount' AND CAST(value AS INT) = 0
    )
    AND EXISTS (
      SELECT 1 FROM managed_policies
      WHERE domain = 'com.apple.loginwindow' AND username = ''
        AND name = 'GuestEnabled' AND CAST(value AS INT) = 0
    )
    AND NOT EXISTS (
      SELECT 1 FROM plist
      WHERE path = '/Library/Preferences/com.apple.loginwindow.plist'
        AND key = 'GuestEnabled'
        AND value IN ('true', '1')
    );

- name: macOS - Software Update settings DDM declaration active
  platform: darwin
  description: |
    Checks that a com.apple.configuration.softwareupdate.settings DDM declaration is delivered and applied on the host (its identifier is recorded in the SoftwareUpdate daemon's DDM state plist). Under DDM, Fleet's declaration content is the source of truth and per-key osquery checks against CFPreferences are unreliable, so this single presence check replaces the previous keyed policies.
  resolution: As an IT admin, deploy or update the DDM software update declaration (platforms/macos/declaration-profiles/softwareupdate-settings-ddm.json) and confirm it shows as verified in the host's MDM panel.
  query: |
    SELECT 1 FROM plist
    WHERE path = '/var/db/softwareupdate/SoftwareUpdateDDMStatePersistence.plist'
      AND key = 'SUCorePersistedStatePolicyFields'
      AND subkey LIKE 'SUCoreDDMDeclarationGlobalSettings/serializedKeys/%'
      AND value LIKE 'com.apple.RemoteManagement.SoftwareUpdateExtension.GlobalSettings/%';
